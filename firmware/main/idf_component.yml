## 组件依赖：显示面板 / 触摸 / LVGL 移植层
dependencies:
  idf:
    version: ">=5.3"
  lvgl/lvgl: "~9.2.0"
  espressif/esp_lvgl_port: "~2.4"
  # 466x466 圆形 AMOLED 面板驱动（QSPI SH8601）
