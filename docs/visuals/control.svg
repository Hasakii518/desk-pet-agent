<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 360 400" role="img">
  <title>④ 控制中心</title>
  <desc>从主页向下滑进入：纯黑背景上的 3 列 × 2 行快捷开关，激活态显示 workblue/mint 填充与右上角指示点，上滑或点手柄返回主页。</desc>

  <!-- 圆形屏幕：纯黑背景 -->
  <circle cx="180" cy="180" r="150" fill="#0A0A0C" stroke="#5F5E5A" stroke-width="2"/>

  <!-- 手柄 -->
  <rect x="150" y="56" width="60" height="6" rx="3" fill="#5F5E5A"/>
  <text x="180" y="82" font-size="11" fill="#888780" text-anchor="middle" font-family="sans-serif">控制中心</text>

  <!-- Row 1 -->
  <!-- WiFi（激活：workblue + mint 点） -->
  <rect x="79" y="104" width="62" height="54" rx="12" fill="#58B4FC"/>
  <circle cx="131" cy="114" r="3.5" fill="#5EE9B0"/>
  <path d="M101 127 A6 6 0 0 1 119 127" stroke="#0A0A0C" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M96 122 A11 11 0 0 1 124 122" stroke="#0A0A0C" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <circle cx="110" cy="131" r="1.8" fill="#0A0A0C"/>
  <text x="110" y="150" font-size="11" fill="#0A0A0C" text-anchor="middle" font-family="sans-serif">WiFi</text>

  <!-- 蓝牙（激活：workblue + mint 点） -->
  <rect x="149" y="104" width="62" height="54" rx="12" fill="#58B4FC"/>
  <circle cx="201" cy="114" r="3.5" fill="#5EE9B0"/>
  <path d="M180 114 L186 120 L174 126 L186 132 L180 138" stroke="#0A0A0C" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M180 114 L174 120 L186 126 L174 132 L180 138" stroke="#0A0A0C" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  <text x="180" y="150" font-size="11" fill="#0A0A0C" text-anchor="middle" font-family="sans-serif">蓝牙</text>

  <!-- 设置（stone） -->
  <rect x="219" y="104" width="62" height="54" rx="12" fill="#1E1F25"/>
  <circle cx="250" cy="124" r="8" fill="none" stroke="#E8ECF2" stroke-width="1.8"/>
  <circle cx="250" cy="124" r="3" fill="#E8ECF2"/>
  <line x1="250" y1="113" x2="250" y2="116" stroke="#E8ECF2" stroke-width="1.8"/>
  <line x1="250" y1="132" x2="250" y2="135" stroke="#E8ECF2" stroke-width="1.8"/>
  <line x1="239" y1="124" x2="242" y2="124" stroke="#E8ECF2" stroke-width="1.8"/>
  <line x1="258" y1="124" x2="261" y2="124" stroke="#E8ECF2" stroke-width="1.8"/>
  <text x="250" y="150" font-size="11" fill="#E8ECF2" text-anchor="middle" font-family="sans-serif">设置</text>

  <!-- Row 2 -->
  <!-- 亮度（stone） -->
  <rect x="79" y="172" width="62" height="54" rx="12" fill="#1E1F25"/>
  <circle cx="110" cy="192" r="6" fill="#E8ECF2"/>
  <line x1="110" y1="181" x2="110" y2="184" stroke="#E8ECF2" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="110" y1="200" x2="110" y2="203" stroke="#E8ECF2" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="99" y1="192" x2="102" y2="192" stroke="#E8ECF2" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="118" y1="192" x2="121" y2="192" stroke="#E8ECF2" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="102" y1="184" x2="104" y2="186" stroke="#E8ECF2" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="118" y1="200" x2="116" y2="202" stroke="#E8ECF2" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="118" y1="184" x2="116" y2="186" stroke="#E8ECF2" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="102" y1="200" x2="104" y2="202" stroke="#E8ECF2" stroke-width="1.8" stroke-linecap="round"/>
  <text x="110" y="218" font-size="11" fill="#E8ECF2" text-anchor="middle" font-family="sans-serif">亮度</text>

  <!-- 勿扰（关闭：stone dim） -->
  <rect x="149" y="172" width="62" height="54" rx="12" fill="#1E1F25"/>
  <path d="M186 180 A10 10 0 1 0 186 200 A8 8 0 1 1 186 180 Z" fill="#E8ECF2" opacity="0.4"/>
  <text x="180" y="218" font-size="11" fill="#E8ECF2" opacity="0.5" text-anchor="middle" font-family="sans-serif">勿扰</text>

  <!-- 传输（激活：mint） -->
  <rect x="219" y="172" width="62" height="54" rx="12" fill="#5EE9B0"/>
  <circle cx="271" cy="182" r="3.5" fill="#0A0A0C"/>
  <path d="M240 196 A9 9 0 1 1 240 186" stroke="#0A0A0C" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M240 186 L236 186 M240 186 L240 190" stroke="#0A0A0C" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <text x="250" y="218" font-size="11" fill="#0A0A0C" text-anchor="middle" font-family="sans-serif">传输</text>

  <text x="180" y="300" font-size="11" fill="#B4B2A9" text-anchor="middle" font-family="sans-serif">点开关 · 上滑返回主页</text>
  <text x="180" y="368" font-size="15" font-weight="500" fill="#1f2330" text-anchor="middle" font-family="sans-serif">④ 控制中心（首页下滑进入）</text>
  <text x="180" y="390" font-size="12" fill="#6b7280" text-anchor="middle" font-family="sans-serif">WiFi / 蓝牙 / 设置 / 亮度 / 勿扰 / 传输 · 一排 3 个</text>
</svg>
