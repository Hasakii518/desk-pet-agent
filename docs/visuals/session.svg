<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 360 400" role="img">
  <title>③ 会话页</title>
  <desc>向右滑进入：单会话全屏，顶部来源色圆点与会话名，最新回复卡片，mint 高亮下一步 pill，可上下滑翻看历史。</desc>

  <!-- 圆形屏幕：纯黑背景 + Source Halo -->
  <circle cx="180" cy="180" r="150" fill="#0A0A0C" stroke="#B18CFF" stroke-width="3" stroke-dasharray="10 6"/>

  <!-- 头部：来源色点 + 会话名 + 时间 -->
  <circle cx="118" cy="92" r="5" fill="#B18CFF"/>
  <text x="130" y="88" font-size="13" fill="#E8ECF2" text-anchor="start" font-family="sans-serif">会话A · claude-code</text>
  <text x="130" y="103" font-size="11" fill="#888780" text-anchor="start" font-family="sans-serif">12:04</text>

  <!-- 最新回复卡片 -->
  <text x="70" y="132" font-size="11" fill="#888780" text-anchor="start" font-family="sans-serif">最新回复</text>
  <rect x="68" y="140" width="224" height="44" rx="12" fill="#1E1F25"/>
  <text x="80" y="160" font-size="11" fill="#B4B2A9" text-anchor="start" font-family="sans-serif">已修改 3 个文件，正在跑…</text>
  <text x="80" y="176" font-size="10" fill="#888780" text-anchor="start" font-family="sans-serif">验证改动并生成测试骨架</text>

  <!-- 下一步 pill -->
  <rect x="68" y="196" width="224" height="34" rx="17" fill="#5EE9B0"/>
  <text x="98" y="217" font-size="12" fill="#0A0A0C" text-anchor="start" font-family="sans-serif">▸ 运行 npm test</text>

  <!-- 历史 -->
  <text x="70" y="252" font-size="11" fill="#888780" text-anchor="start" font-family="sans-serif">历史</text>
  <text x="70" y="272" font-size="11" fill="#B4B2A9" text-anchor="start" font-family="sans-serif">· 用户：重构登录模块</text>
  <text x="70" y="290" font-size="11" fill="#B4B2A9" text-anchor="start" font-family="sans-serif">· Agent：已生成测试骨架</text>

  <!-- 底部提示 -->
  <text x="180" y="322" font-size="11" fill="#888780" text-anchor="middle" font-family="sans-serif">↑↓ 上下滑翻看 · 右滑下一个 · 左滑返回</text>

  <!-- 说明 -->
  <text x="180" y="368" font-size="15" font-weight="500" fill="#1f2330" text-anchor="middle" font-family="sans-serif">③ 会话页（右滑进入）</text>
  <text x="180" y="390" font-size="12" fill="#6b7280" text-anchor="middle" font-family="sans-serif">单会话全屏 · 来源色 · mint 下一步</text>
</svg>
