<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 560" role="img">
  <title>四屏圆形 UI 与滑动导航</title>
  <desc>同一圆形画布的四个视图：① 主页桌宠（Source Halo + 来源色通知胶囊）；② 左滑负一屏（点击语音 + 四层卡片）；③ 右滑会话页（单会话 + mint 下一步）；④ 首页下滑控制中心（3×2 tile）。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="40" y="36" font-size="14" font-weight="500" fill="#1f2330" font-family="sans-serif">四屏圆形 UI（滑动导航）</text>
  <text x="40" y="58" font-size="12" fill="#6b7280" font-family="sans-serif">同一圆形画布的不同视图，纯黑 AMOLED 背景，靠滑动切换，无多窗口</text>

  <!-- ② 负一屏 -->
  <circle cx="120" cy="180" r="85" fill="#0A0A0C" stroke="#58B4FC" stroke-width="2" stroke-dasharray="8 5"/>
  <circle cx="120" cy="150" r="13" fill="#1E1F25" stroke="#E8ECF2" stroke-width="1"/>
  <path d="M120 145 L120 153" stroke="#E8ECF2" stroke-width="2" stroke-linecap="round"/>
  <path d="M116 149 Q120 145 124 149 L124 153 Q120 157 116 153 Z" fill="none" stroke="#E8ECF2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="86" y="178" width="68" height="20" rx="10" fill="#1E1F25"/>
  <text x="120" y="192" font-size="9" fill="#E8ECF2" text-anchor="middle" font-family="sans-serif">点击说话</text>
  <rect x="72" y="208" width="96" height="14" rx="6" fill="#1E1F25"/>
  <rect x="72" y="226" width="96" height="12" rx="6" fill="#1E1F25"/>
  <rect x="72" y="242" width="96" height="12" rx="6" fill="none" stroke="#5F5E5A" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="120" y="296" font-size="14" font-weight="500" fill="#1f2330" text-anchor="middle" font-family="sans-serif">② 负一屏</text>

  <!-- ① 主页 -->
  <circle cx="340" cy="180" r="85" fill="#0A0A0C" stroke="#B18CFF" stroke-width="2" stroke-dasharray="8 5"/>
  <circle cx="322" cy="172" r="9" fill="#E8ECF2"/>
  <circle cx="358" cy="172" r="9" fill="#E8ECF2"/>
  <path d="M324 192 Q340 204 356 192" stroke="#E8ECF2" stroke-width="3" fill="none" stroke-linecap="round"/>
  <rect x="290" y="104" width="100" height="22" rx="11" fill="#1E1F25" stroke="#B18CFF" stroke-width="1"/>
  <circle cx="304" cy="115" r="3.5" fill="#B18CFF"/>
  <text x="340" y="112" font-size="8" fill="#E8ECF2" text-anchor="middle" font-family="sans-serif">claude-code</text>
  <text x="340" y="123" font-size="7" fill="#B4B2A9" text-anchor="middle" font-family="sans-serif">已修改 3 个文件…</text>
  <text x="340" y="296" font-size="14" font-weight="500" fill="#1f2330" text-anchor="middle" font-family="sans-serif">① 主页 · 桌宠</text>

  <!-- ③ 会话页 -->
  <circle cx="560" cy="180" r="85" fill="#0A0A0C" stroke="#B18CFF" stroke-width="2" stroke-dasharray="8 5"/>
  <circle cx="506" cy="134" r="4" fill="#B18CFF"/>
  <text x="560" y="138" font-size="10" fill="#E8ECF2" text-anchor="middle" font-family="sans-serif">会话A · claude-code</text>
  <text x="560" y="150" font-size="9" fill="#888780" text-anchor="middle" font-family="sans-serif">12:04</text>
  <rect x="500" y="160" width="120" height="26" rx="8" fill="#1E1F25"/>
  <text x="560" y="170" font-size="8" fill="#B4B2A9" text-anchor="middle" font-family="sans-serif">已改 3 文件…</text>
  <rect x="500" y="194" width="120" height="20" rx="10" fill="#5EE9B0"/>
  <text x="560" y="208" font-size="9" fill="#0A0A0C" text-anchor="middle" font-family="sans-serif">▸ npm test</text>
  <text x="560" y="296" font-size="14" font-weight="500" fill="#1f2330" text-anchor="middle" font-family="sans-serif">③ 会话页</text>

  <!-- ④ 控制中心 -->
  <circle cx="340" cy="430" r="85" fill="#0A0A0C" stroke="#5F5E5A" stroke-width="2"/>
  <rect x="310" y="392" width="60" height="6" rx="3" fill="#5F5E5A"/>
  <rect x="285" y="408" width="34" height="30" rx="8" fill="#58B4FC"/>
  <rect x="323" y="408" width="34" height="30" rx="8" fill="#58B4FC"/>
  <rect x="361" y="408" width="34" height="30" rx="8" fill="#1E1F25"/>
  <rect x="285" y="444" width="34" height="30" rx="8" fill="#1E1F25"/>
  <rect x="323" y="444" width="34" height="30" rx="8" fill="#1E1F25"/>
  <rect x="361" y="444" width="34" height="30" rx="8" fill="#5EE9B0"/>
  <text x="302" y="427" font-size="7" fill="#0A0A0C" text-anchor="middle" font-family="sans-serif">WiFi</text>
  <text x="340" y="427" font-size="7" fill="#0A0A0C" text-anchor="middle" font-family="sans-serif">蓝牙</text>
  <text x="378" y="427" font-size="7" fill="#E8ECF2" text-anchor="middle" font-family="sans-serif">设置</text>
  <text x="302" y="463" font-size="7" fill="#E8ECF2" text-anchor="middle" font-family="sans-serif">亮度</text>
  <text x="340" y="463" font-size="7" fill="#E8ECF2" opacity="0.5" text-anchor="middle" font-family="sans-serif">勿扰</text>
  <text x="378" y="463" font-size="7" fill="#0A0A0C" text-anchor="middle" font-family="sans-serif">传输</text>
  <text x="340" y="545" font-size="14" font-weight="500" fill="#1f2330" text-anchor="middle" font-family="sans-serif">④ 控制中心</text>

  <!-- arrows -->
  <line x1="245" y1="180" x2="215" y2="180" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="230" y="120" font-size="12" fill="#6b7280" text-anchor="middle" font-family="sans-serif">左滑</text>
  <line x1="435" y1="180" x2="465" y2="180" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="450" y="120" font-size="12" fill="#6b7280" text-anchor="middle" font-family="sans-serif">右滑</text>
  <line x1="340" y1="272" x2="340" y2="338" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="372" y="308" font-size="12" fill="#6b7280" text-anchor="middle" font-family="sans-serif">下滑</text>

  <text x="340" y="522" font-size="12" fill="#444441" text-anchor="middle" font-family="sans-serif">左滑→负一屏 ｜ 右滑→会话 ｜ 首页下滑→控制中心 ｜ 上下滑→翻看内容 ｜ 点按→桌宠</text>
</svg>
