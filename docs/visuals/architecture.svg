<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 680 478" role="img">
  <title>DeskPet Agent 系统架构</title>
  <desc>PC 采集 WorkBuddy 与 Claude Code 事件，经 bridge 聚合成 AgentEvent，通过串口/BLE/WiFi 下发到 ESP32-S3 圆形 AMOLED 显示屏。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="40" y="36" font-size="14" font-weight="500" fill="#1f2330" font-family="sans-serif">系统架构：PC 采集 Agent 事件 → ESP32 圆形屏显示</text>
  <text x="40" y="58" font-size="12" fill="#6b7280" font-family="sans-serif">ESP32 是显示器+输入设备；PC 是大脑（解析 Agent、聚合成事件）</text>

  <rect x="40" y="84" width="190" height="150" rx="14" fill="#E8F4FD" stroke="#185FA5" stroke-width="0.5"/>
  <text x="56" y="108" font-size="14" font-weight="500" fill="#0c447c" font-family="sans-serif">PC（Windows / macOS）</text>
  <rect x="56" y="120" width="158" height="42" rx="8" fill="#ffffff" stroke="#185FA5" stroke-width="0.5"/>
  <text x="66" y="138" font-size="14" font-weight="500" fill="#0c447c" font-family="sans-serif">WorkBuddy</text>
  <text x="66" y="155" font-size="12" fill="#5f5e5a" font-family="sans-serif">任务 / 对话</text>
  <rect x="56" y="172" width="158" height="42" rx="8" fill="#ffffff" stroke="#185FA5" stroke-width="0.5"/>
  <text x="66" y="190" font-size="14" font-weight="500" fill="#0c447c" font-family="sans-serif">Claude Code</text>
  <text x="66" y="207" font-size="12" fill="#5f5e5a" font-family="sans-serif">hooks + JSONL</text>

  <line x1="230" y1="159" x2="278" y2="159" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="280" y="84" width="180" height="150" rx="14" fill="#E8F4FD" stroke="#185FA5" stroke-width="0.5"/>
  <text x="296" y="108" font-size="14" font-weight="500" fill="#0c447c" font-family="sans-serif">bridge/（Node + TS）</text>
  <rect x="296" y="120" width="148" height="26" rx="6" fill="#ffffff" stroke="#185FA5" stroke-width="0.5"/>
  <text x="304" y="137" font-size="12" fill="#444441" font-family="sans-serif">connectors/* 采集</text>
  <rect x="296" y="152" width="148" height="26" rx="6" fill="#ffffff" stroke="#185FA5" stroke-width="0.5"/>
  <text x="304" y="169" font-size="12" fill="#444441" font-family="sans-serif">core 聚合 → AgentEvent</text>
  <rect x="296" y="184" width="148" height="26" rx="6" fill="#ffffff" stroke="#185FA5" stroke-width="0.5"/>
  <text x="304" y="201" font-size="12" fill="#444441" font-family="sans-serif">state / session-store</text>
  <text x="296" y="224" font-size="12" fill="#9ca3af" font-family="sans-serif">PC 端「大脑」</text>

  <line x1="370" y1="234" x2="370" y2="268" stroke="#5f5e5a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="382" y="250" font-size="12" fill="#444441" font-family="sans-serif">Serial / BLE / WiFi</text>
  <text x="382" y="266" font-size="12" fill="#9ca3af" font-family="sans-serif">行分隔 JSON</text>

  <circle cx="370" cy="350" r="78" fill="#0A0A0C" stroke="#B18CFF" stroke-width="2" stroke-dasharray="8 5"/>
  <circle cx="348" cy="340" r="9" fill="#E8ECF2"/>
  <circle cx="392" cy="340" r="9" fill="#E8ECF2"/>
  <path d="M350 362 Q370 378 390 362" stroke="#E8ECF2" stroke-width="4" fill="none" stroke-linecap="round"/>
  <text x="370" y="442" font-size="14" font-weight="500" fill="#1f2330" text-anchor="middle" font-family="sans-serif">ESP32-S3 AMOLED</text>
  <text x="370" y="460" font-size="12" fill="#6b7280" text-anchor="middle" font-family="sans-serif">466×466 圆形屏 · LVGL 9 · Source Halo</text>

  <text x="470" y="314" font-size="12" fill="#444441" font-family="sans-serif">圆形屏 = 单画布多视图</text>
  <text x="470" y="334" font-size="12" fill="#444441" font-family="sans-serif">① 桌宠主页</text>
  <text x="470" y="354" font-size="12" fill="#444441" font-family="sans-serif">② 左滑 负一屏</text>
  <text x="470" y="374" font-size="12" fill="#444441" font-family="sans-serif">③ 右滑 会话页</text>
  <text x="470" y="394" font-size="12" fill="#444441" font-family="sans-serif">④ 下滑 控制中心</text>
</svg>
